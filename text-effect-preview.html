<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ivLyrics Text Effect Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --lyrics-color-active: #f8fbff;
      --lyrics-color-inactive: rgba(218, 229, 246, 0.5);
      --karaoke-glyph-bleed-x: 0.16em;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07090f;
      color: #eef3ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(79, 136, 255, 0.24), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(255, 94, 158, 0.18), transparent 26%),
        linear-gradient(180deg, #07090f 0%, #0b1020 100%);
    }

    main {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 38px 0 52px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 24px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: 0;
      line-height: 1.08;
    }

    p {
      margin: 0;
    }

    .subtitle {
      color: rgba(238, 243, 255, 0.66);
      font-size: 15px;
      line-height: 1.55;
    }

    .stage {
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(7, 10, 18, 0.7);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      padding: clamp(18px, 3vw, 32px);
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .effect-card {
      min-height: 168px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.045);
      padding: 18px;
      overflow: visible;
    }

    .effect-card strong {
      display: block;
      margin-bottom: 4px;
      color: rgba(238, 243, 255, 0.86);
      font-size: 13px;
      font-weight: 650;
    }

    .effect-card small {
      display: block;
      min-height: 34px;
      color: rgba(238, 243, 255, 0.52);
      font-size: 12px;
      line-height: 1.45;
    }

    .lyrics-lyricsContainer-LyricsLine {
      margin-top: 22px;
      color: var(--lyrics-color-active);
      font-size: clamp(28px, 4.2vw, 46px);
      font-weight: 750;
      line-height: 1.16;
      overflow: visible;
    }

    .lyrics-lyricsContainer-LyricsLine p {
      overflow: visible;
    }

    .lyrics-karaoke-line,
    .lyrics-karaoke-part {
      display: inline-block;
      overflow: visible;
    }

    .lyrics-karaoke-char {
      display: inline-block;
      white-space: pre-wrap;
      padding-inline: var(--karaoke-glyph-bleed-x);
      margin-inline: calc(var(--karaoke-glyph-bleed-x) * -1);
      color: var(--lyrics-color-active);
      vertical-align: baseline;
      overflow: visible;
    }

    @keyframes ivlyrics-kind-effect-tremble {
      0%, 100% { translate: 0 0; }
      25% { translate: -0.5px 0.25px; }
      50% { translate: 0.45px -0.25px; }
      75% { translate: -0.25px -0.35px; }
    }

    @keyframes ivlyrics-kind-adlib-float {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -1.5px; }
    }

    @keyframes ivlyrics-kind-pulse {
      0%, 100% { scale: 1; filter: brightness(1); }
      45% { scale: 1.025; filter: brightness(1.12); }
    }

    @keyframes ivlyrics-kind-wave {
      0%, 100% { translate: 0 0; }
      35% { translate: 0 -0.11em; }
      70% { translate: 0 0.03em; }
    }

    @keyframes ivlyrics-kind-sparkle {
      0%, 100% {
        filter: brightness(1);
        text-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }
      42% {
        filter: brightness(1.22);
        text-shadow: 0 0 0.18em rgba(255, 255, 255, 0.34), 0 0 0.42em currentColor;
      }
      58% {
        filter: brightness(0.96);
        text-shadow: 0 0 0.08em rgba(255, 255, 255, 0.16);
      }
    }

    @keyframes ivlyrics-kind-echo {
      0%, 100% { text-shadow: 0 0 0 rgba(255, 255, 255, 0); }
      50% {
        text-shadow:
          0.07em 0.04em 0 rgba(255, 255, 255, 0.18),
          0.14em 0.08em 0.22em rgba(248, 251, 255, 0.28);
      }
    }

    @keyframes ivlyrics-kind-whisper {
      0%, 100% {
        opacity: 0.86;
        filter: blur(0);
        translate: 0 0;
      }
      45% {
        opacity: 0.72;
        filter: blur(0.55px);
        translate: 0.04em -0.02em;
      }
    }

    @keyframes ivlyrics-kind-bounce {
      0%, 100% { translate: 0 0; }
      32% { translate: 0 -0.16em; }
      58% { translate: 0 0.035em; }
      76% { translate: 0 -0.045em; }
    }

    @keyframes ivlyrics-kind-sway {
      0%, 100% { translate: 0 0; rotate: 0deg; }
      30% { translate: -0.035em 0; rotate: -1.2deg; }
      70% { translate: 0.035em 0; rotate: 1.2deg; }
    }

    @keyframes ivlyrics-kind-glow {
      0%, 100% {
        filter: brightness(1);
        text-shadow: 0 0 0 rgba(255, 255, 255, 0);
      }
      50% {
        filter: brightness(1.14);
        text-shadow: 0 0 0.12em rgba(255, 255, 255, 0.3), 0 0 0.48em rgba(248, 251, 255, 0.26);
      }
    }

    @keyframes ivlyrics-kind-glitch {
      0%, 100% { translate: 0 0; text-shadow: 0 0 0 transparent; }
      16% { translate: -0.035em 0.01em; text-shadow: 0.045em 0 rgba(111, 211, 255, 0.34), -0.045em 0 rgba(255, 116, 172, 0.3); }
      18% { translate: 0.03em -0.01em; text-shadow: -0.04em 0 rgba(111, 211, 255, 0.26), 0.04em 0 rgba(255, 116, 172, 0.28); }
      20%, 64% { translate: 0 0; text-shadow: 0 0 0 transparent; }
      66% { translate: 0.025em 0; text-shadow: 0.035em 0 rgba(111, 211, 255, 0.24), -0.035em 0 rgba(255, 116, 172, 0.24); }
      68% { translate: 0 0; text-shadow: 0 0 0 transparent; }
    }

    @keyframes ivlyrics-kind-flicker {
      0%, 100% { opacity: 1; filter: brightness(1); }
      12% { opacity: 0.76; filter: brightness(0.92); }
      15%, 48% { opacity: 1; filter: brightness(1.08); }
      52% { opacity: 0.82; filter: brightness(0.96); }
      56% { opacity: 1; filter: brightness(1.06); }
    }

    @keyframes ivlyrics-kind-float {
      0%, 100% { translate: 0 0; rotate: 0deg; }
      50% { translate: 0 -0.09em; rotate: 0.45deg; }
    }

    @keyframes ivlyrics-kind-blur {
      0%, 100% { filter: blur(0) brightness(1); opacity: 0.98; }
      50% { filter: blur(0.65px) brightness(1.08); opacity: 0.9; }
    }

    @keyframes ivlyrics-kind-pop {
      0%, 100% { scale: 1; filter: brightness(1); }
      18% { scale: 1.055; filter: brightness(1.12); }
      34% { scale: 0.992; filter: brightness(1); }
    }

    .effect .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-effect-tremble 180ms steps(2, end) infinite;
    }

    .adlib .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-adlib-float 1.05s ease-in-out infinite;
    }

    .pulse .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-pulse 940ms ease-in-out infinite;
      transform-origin: center;
    }

    .wave .lyrics-karaoke-line.is-active .lyrics-karaoke-char {
      animation: ivlyrics-kind-wave 920ms ease-in-out infinite;
    }

    .wave .lyrics-karaoke-line.is-active .lyrics-karaoke-char:nth-child(2n) {
      animation-delay: -120ms;
    }

    .wave .lyrics-karaoke-line.is-active .lyrics-karaoke-char:nth-child(3n) {
      animation-delay: -240ms;
    }

    .sparkle .lyrics-karaoke-line.is-active .lyrics-karaoke-char {
      animation: ivlyrics-kind-sparkle 1.18s ease-in-out infinite;
    }

    .echo .lyrics-karaoke-line.is-active .lyrics-karaoke-char {
      animation: ivlyrics-kind-echo 1.28s ease-in-out infinite;
    }

    .whisper .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-whisper 1.45s ease-in-out infinite;
    }

    .bounce .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-bounce 780ms cubic-bezier(0.2, 0.85, 0.24, 1) infinite;
    }

    .sway .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-sway 1.35s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .glow .lyrics-karaoke-line.is-active .lyrics-karaoke-char {
      animation: ivlyrics-kind-glow 1.35s ease-in-out infinite;
    }

    .glitch .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-glitch 1.12s steps(1, end) infinite;
    }

    .flicker .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-flicker 1.22s steps(1, end) infinite;
    }

    .float .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-float 1.65s ease-in-out infinite;
      transform-origin: center;
    }

    .blur .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-blur 1.5s ease-in-out infinite;
    }

    .pop .lyrics-karaoke-line.is-active {
      animation: ivlyrics-kind-pop 1.08s cubic-bezier(0.18, 0.9, 0.36, 1) infinite;
      transform-origin: center;
    }

    .sample-stack {
      margin-top: 26px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      overflow: visible;
    }

    .lyrics-karaoke-stack {
      display: flex;
      flex-direction: column;
      gap: 0.26em;
      align-items: center;
      overflow: visible;
      font-size: clamp(30px, 5vw, 58px);
      font-weight: 780;
      line-height: 1.12;
    }

    .lyrics-karaoke-part.background {
      font-size: 0.9em;
      opacity: 0.9;
    }

    .lyrics-karaoke-part.speaker-male-2 {
      --lyrics-color-active: #d7ecff;
    }

    .lyrics-karaoke-part.speaker-female-1 {
      --lyrics-color-active: #ffe7ef;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Text Effect Preview</h1>
        <p class="subtitle">Sync Creator의 텍스트 효과 저장값과 동일한 class 이름으로 렌더링합니다.</p>
      </div>
    </header>

    <section class="stage">
      <div id="effectGrid" class="grid"></div>

      <div class="sample-stack">
        <strong>Multi-vocal stack sample</strong>
        <div class="lyrics-karaoke-stack">
          <span class="lyrics-karaoke-part lead pulse speaker-male-2">
            <span class="lyrics-karaoke-line is-active" data-text="Lead vocal pulse"></span>
          </span>
          <span class="lyrics-karaoke-part background sparkle speaker-female-1">
            <span class="lyrics-karaoke-line is-active" data-text="Background sparkle"></span>
          </span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const effects = [
      { id: "vocal", label: "효과없음", desc: "기본 karaoke 표시. 추가 움직임 없음.", text: "No effect" },
      { id: "effect", label: "떨림", desc: "효과음용 짧은 떨림.", text: "Shake it" },
      { id: "adlib", label: "숨쉬기", desc: "애드립용 부드러운 상하 호흡.", text: "Breathe out" },
      { id: "pulse", label: "맥동", desc: "라인 전체가 살짝 커졌다 돌아옴.", text: "Pulse tonight" },
      { id: "wave", label: "웨이브", desc: "글자 단위로 파도처럼 움직임.", text: "Wave across" },
      { id: "sparkle", label: "반짝임", desc: "밝기와 글로우가 순간적으로 튐.", text: "Sparkle up" },
      { id: "echo", label: "에코", desc: "희미한 잔상이 뒤따라오는 느낌.", text: "Echo back" },
      { id: "whisper", label: "속삭임", desc: "흐릿하고 작은 흔들림.", text: "Whisper low" },
      { id: "bounce", label: "바운스", desc: "가볍게 튀어 오르는 리듬.", text: "Bounce back" },
      { id: "sway", label: "스웨이", desc: "좌우로 아주 작게 흔들림.", text: "Sway with me" },
      { id: "glow", label: "글로우", desc: "은은하게 밝아지는 발광.", text: "Glow softly" },
      { id: "glitch", label: "글리치", desc: "짧은 색 분리와 순간 흔들림.", text: "Glitch mode" },
      { id: "flicker", label: "깜빡임", desc: "불빛처럼 빠르게 깜빡임.", text: "Flicker on" },
      { id: "float", label: "떠다님", desc: "느리게 위아래로 떠다님.", text: "Float away" },
      { id: "blur", label: "블러", desc: "초점이 살짝 흐려졌다 돌아옴.", text: "Blur the line" },
      { id: "pop", label: "팝", desc: "짧고 탄력 있게 튀는 강조.", text: "Pop out" },
    ];

    const createChars = (text) => Array.from(text)
      .map((char) => `<span class="lyrics-karaoke-char">${char === " " ? "&nbsp;" : char}</span>`)
      .join("");

    const grid = document.getElementById("effectGrid");
    grid.innerHTML = effects.map((effect) => `
      <article class="effect-card">
        <strong>${effect.label} <span style="opacity:.45">(${effect.id})</span></strong>
        <small>${effect.desc}</small>
        <div class="lyrics-lyricsContainer-LyricsLine lyrics-lyricsContainer-LyricsLine-active ${effect.id}">
          <p><span class="lyrics-karaoke-line is-active">${createChars(effect.text)}</span></p>
        </div>
      </article>
    `).join("");

    document.querySelectorAll("[data-text]").forEach((node) => {
      node.innerHTML = createChars(node.dataset.text || "");
    });
  </script>
</body>
</html>
